Filter.tooptip.chromakey="Эта функция делает области определённого цвета на экране прозрачными. \nМожно использовать с зелёным экраном, когда нужно оставить человека, но убрать фон."
Filter.tooptip.colorcorrection="Эта функция позволяет точно изменять цвета и тона изображений и видео. \nМожно настроить гамму, контрастность и яркость."
Filter.tooptip.colorfilter="Эта функция позволяет легко изменять цвета и тона изображений и видео. \nПресетные фильтры PRISM предлагают те же эффекты, что и в приложениях камеры."
Filter.tooptip.colorkey="Эта функция делает области определённого цвета на изображении прозрачными."
Filter.tooptip.compressor="Эта функция сжимает сигналы выше определённого уровня и балансирует диапазон общей громкости. \nПолезна для предотвращения внезапного увеличения громкости микрофона."
Filter.tooptip.corp.pad="Эта функция позволяет обрезать или дополнить верх, низ, левую и правую стороны изображений и видео. \nИспользуйте для обрезки чёрных полос по бокам камеры."
Filter.tooptip.expander="Этот эффект противоположен аудиокомпрессору. \nПолезен для уменьшения фонового шума: звуков компьютера, \nмыши, клавиатуры, дыхания и других нежелательных звуков."
Filter.tooptip.gain="Эта функция компенсирует снижение уровня от компрессора. \nМожно задать усиление для сжатого аудиосигнала."
Filter.tooptip.image.mask="Эта функция позволяет накладывать маски изображений и фигур поверх источника. \nМожно создавать эффекты маскировки в формы или наложения изображений."
Filter.tooptip.invert.polarity="Эта функция минимизирует ухудшение качества звука из-за фазовой компенсации при использовании двух и более микрофонов."
Filter.tooptip.limiter="Эта функция ограничивает выходной уровень аудиоисточника."
Filter.tooptip.lumakey="Эта функция делает области с определённой яркостью прозрачными на основе яркости экрана."
Filter.tooptip.noise.gate="Эта функция удаляет аудиосигналы ниже определённого уровня громкости. \nСамый используемый аудиофильтр для блокировки микрофона при отсутствии входного сигнала."
Filter.tooptip.noise.suppression="Устранение фонового шума."
Filter.tooptip.render.delay="Эта функция устанавливает задержку рендеринга видео. \nИспользуйте для синхронизации аудио/видео (0-500 мс) для видео, игр, медиаисточников и т.д."
Filter.tooptip.scale.aspectradio="Эта функция настраивает разрешение и соотношение сторон изображений и видео. \nПолезна для масштабирования видео или игр с низким разрешением."
Filter.tooptip.scroll="Эта функция применяет эффект прокрутки вверх, вниз, влево и вправо к источнику. \nИспользуйте для применения эффекта движения к текстовому источнику."
Filter.tooptip.sharpen="Эта функция делает изображения и видео более чёткими."
Filter.tooptip.video.delay="Эта функция устанавливает задержку видеоисточника."
Filter.tooptip.vst.plugin="Используйте различные аудиофильтры с помощью VST-плагинов."
